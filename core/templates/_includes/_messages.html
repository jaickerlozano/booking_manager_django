{% if messages %}
<div class="fixed top-24 right-4 z-50 w-full max-w-sm space-y-2 pointer-events-none" id="toast-container">
    {% for message in messages %}
    <div id="toast-message-{{ forloop.counter }}" class="pointer-events-auto flex items-center p-4 w-full text-gray-500 bg-white rounded-lg shadow-md border border-gray-100 transition-opacity duration-300" role="alert">
        
        <!-- Icono dinámico según el tipo de mensaje -->
        {% if message.tags == 'success' %}
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
            </svg>
            <span class="sr-only">Éxito</span>
        </div>
        {% elif message.tags == 'error' %}
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-red-500 bg-red-100 rounded-lg">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/>
            </svg>
            <span class="sr-only">Error</span>
        </div>
        {% else %}
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-blue-500 bg-blue-100 rounded-lg">
            <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/>
            </svg>
            <span class="sr-only">Info</span>
        </div>
        {% endif %}
        
        <!-- Contenido del mensaje -->
        <div class="ms-3 text-sm font-normal">{{ message }}</div>
        
        <!-- Botón de cerrar manual -->
        <button type="button" class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8" data-dismiss-target="#toast-message-{{ forloop.counter }}" aria-label="Cerrar">
            <span class="sr-only">Cerrar</span>
            <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>

<!-- Script para auto-ocultar los mensajes suavemente -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toasts = document.querySelectorAll('[id^="toast-message-"]');
        toasts.forEach(function(toast) {
            // Se auto-oculta después de 4 segundos (4000ms)
            setTimeout(function() {
                if (toast) {
                    toast.style.opacity = '0';
                    setTimeout(function() {
                        toast.remove();
                    }, 300); // Esperar a que termine la animación de opacidad
                }
            }, 4000); 
        });
    });
</script>
{% endif %}
