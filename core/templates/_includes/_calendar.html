<div class="p-6 border-t border-gray-100 bg-gradient-to-br from-blue-50 to-indigo-50">
    <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center">
        <svg class="w-5 h-5 mr-2 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
            <path d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6-4a2 2 0 100-4 2 2 0 000 4z"></path>
        </svg>
        Calendario de Disponibilidad
    </h3>
    
    <div id="calendar-container" class="bg-white rounded-lg p-4 shadow-sm">
        <div class="flex justify-between items-center mb-4">
            <button id="prev-month" class="px-4 py-2 bg-blue-100 hover:bg-blue-200 rounded-lg transition font-medium text-sm text-blue-700">
                ← Anterior
            </button>
            <h4 id="calendar-month" class="text-center font-semibold text-gray-700 text-lg"></h4>
            <button id="next-month" class="px-4 py-2 bg-blue-100 hover:bg-blue-200 rounded-lg transition font-medium text-sm text-blue-700">
                Siguiente →
            </button>
        </div>
        
        <div id="calendar-grid" class="grid grid-cols-7 gap-2 mb-4"></div>
    </div>
    
    <div class="grid grid-cols-3 gap-4 mt-4 text-sm bg-white rounded-lg p-4">
        <div class="flex items-center">
            <div class="w-4 h-4 bg-green-100 border-2 border-green-400 rounded mr-2"></div>
            <span class="text-gray-700">Disponible</span>
        </div>
        <div class="flex items-center">
            <div class="w-4 h-4 bg-red-100 border-2 border-red-400 rounded mr-2"></div>
            <span class="text-gray-700">Reservado</span>
        </div>
        <div class="flex items-center">
            <div class="w-4 h-4 bg-gray-100 border-2 border-gray-300 rounded mr-2"></div>
            <span class="text-gray-700">Pasado</span>
        </div>
    </div>
</div>

<script>
// Función reutilizable para inicializar el calendario
function initializeCalendar(zoneId) {
    let currentDate = new Date();
    const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                        'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    
    async function loadCalendar() {
        try {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            
            const response = await fetch(`/zones/api/availability/${zoneId}/?year=${year}&month=${month}`);
            
            if (!response.ok) {
                throw new Error('Error al cargar disponibilidad');
            }
            
            const data = await response.json();
            
            if (data.success) {
                renderCalendar(data.booked_dates, year, month);
            } else {
                console.error('Error en API:', data.error);
            }
        } catch (error) {
            console.error('Error cargando calendario:', error);
        }
    }
    
    function renderCalendar(bookedDates, year, month) {
        const firstDay = new Date(year, month - 1, 1);
        const lastDay = new Date(year, month, 0);
        const startDate = new Date(firstDay);
        startDate.setDate(startDate.getDate() - firstDay.getDay());
        
        // Actualizar encabezado del mes
        const monthDisplay = monthNames[month - 1] + ' ' + year;
        document.getElementById('calendar-month').textContent = monthDisplay;
        
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        
        // Encabezados de días de la semana
        const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        dayNames.forEach(day => {
            const dayHeader = document.createElement('div');
            dayHeader.className = 'text-center font-bold text-gray-600 py-2 text-xs sm:text-sm';
            dayHeader.textContent = day;
            grid.appendChild(dayHeader);
        });
        
        // Celdas de fechas
        let currentDateCell = new Date(startDate);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        let cellCount = 0;
        const totalCells = Math.ceil(((lastDay.getDate() + firstDay.getDay()) / 7)) * 7;
        
        while (cellCount < totalCells) {
            const cell = document.createElement('div');
            cell.className = 'aspect-square border rounded-lg flex flex-col items-center justify-center text-xs sm:text-sm font-semibold cursor-pointer transition-all duration-200 hover:shadow-md';
            
            if (currentDateCell.getMonth() !== month - 1) {
                cell.className += ' bg-gray-50 text-gray-300 border-gray-200';
                cell.textContent = currentDateCell.getDate();
            } else {
                const dateStr = currentDateCell.toISOString().split('T')[0];
                const isBooked = bookedDates.includes(dateStr);
                const isPast = currentDateCell < today;
                
                if (isPast) {
                    cell.className += ' bg-gray-100 text-gray-400 border-gray-300 cursor-not-allowed';
                    cell.innerHTML = '<span class="text-lg">✓</span><span>' + currentDateCell.getDate() + '</span>';
                } else if (isBooked) {
                    cell.className += ' bg-red-100 border-red-400 text-red-700 hover:bg-red-200 hover:scale-105';
                    cell.innerHTML = '<span class="text-lg">✕</span><span>' + currentDateCell.getDate() + '</span>';
                    cell.title = 'Reservado - No disponible';
                } else {
                    cell.className += ' bg-green-100 border-green-400 text-green-700 hover:bg-green-200 hover:scale-105';
                    cell.innerHTML = '<span class="text-lg">✓</span><span>' + currentDateCell.getDate() + '</span>';
                    cell.title = 'Disponible para reservar';
                }
            }
            
            grid.appendChild(cell);
            currentDateCell.setDate(currentDateCell.getDate() + 1);
            cellCount++;
        }
    }
    
    // Event listeners para botones de navegación
    const prevBtn = document.getElementById('prev-month');
    const nextBtn = document.getElementById('next-month');
    
    // Remover listeners previos para evitar duplicados
    if (prevBtn && nextBtn) {
        const newPrevBtn = prevBtn.cloneNode(true);
        const newNextBtn = nextBtn.cloneNode(true);
        
        prevBtn.parentNode.replaceChild(newPrevBtn, prevBtn);
        nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
        
        newPrevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            loadCalendar();
        });
        
        newNextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            loadCalendar();
        });
    }
    
    // Cargar calendario inicial
    loadCalendar();
}
</script>
