{% extends "general/layout.html" %}

{% block head_title %}Create Reservation{% endblock %}

{% block content %}
    <h2>Reserva tu espacio común</h2>

    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p}}
        <div>
            <button>Crear Reserva</button> 
            {% if user.resident_profile %}
                <a href="{% url 'profile' %}">Volver a 👈atrás</a>
            {% else %}
                <a href="{% url 'dashboard_admin' %}">Volver a 👈atrás</a>
            {% endif %}
        </div>
    </form>
{% endblock content %}
