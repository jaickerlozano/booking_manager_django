{% extends "general/layout.html" %}

{% block head_title %}Delete Booking{% endblock %}

{% block content %}
    <h2>Eliminar Reserva</h2>
    <p>¿Estás seguro de que deseas eliminar esta reserva?</p>
    <form action="" method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar reserva</button>
        <a href="{% url 'reservation_detail' booking.pk %}">No, volver al detalle de la reserva</a>
    </form>
{% endblock content %}
